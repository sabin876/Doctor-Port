<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/src/assets/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dr. Ulhas Sonar Prajwal | Orthopaedic Surgeon Dubai</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,600&family=Montserrat:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet" />

  <!-- Critical CSS: above-the-fold styles inlined to avoid render-blocking flash -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      background: #ffffff;
      color: #1f2937;
      overflow-x: hidden;
      min-height: 100vh;
    }
    #root { min-height: 100vh; }
    /* Prevent layout shift during font load */
    h1, h2, h3, h4, h5, h6 {
      font-family: 'Montserrat', 'Plus Jakarta Sans', system-ui, sans-serif;
    }
    /* Navbar skeleton to prevent CLS */
    nav {
      position: sticky;
      top: 0;
      z-index: 50;
      background: #ffffff;
      border-bottom: 1px solid #f3f4f6;
      min-height: 64px;
    }
    /* Image lazy-load fade-in */
    img[loading="lazy"] {
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    img[loading="lazy"].loaded {
      opacity: 1;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <div id="google_translate_element" style="display:none"></div>

  <!-- Google Translate: deferred so it doesn't block page render -->
  <script defer type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'en',
        includedLanguages: 'en,hi,ar',
        autoDisplay: false
      }, 'google_translate_element');
    }
  </script>
  <script defer type="text/javascript"
    src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
